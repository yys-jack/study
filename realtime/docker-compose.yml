version: '3.8'

services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: realtime-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: study_db
      MYSQL_USER: canal
      MYSQL_PASSWORD: canal
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    mem_limit: 512m
    networks:
      - realtime-net

  # ==================== Kafka (KRaft) ====================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: realtime-kafka
    restart: always
    environment:
      # KRaft 模式不需要 Zookeeper
      CLUSTER_ID: "realtime-cluster-001"
      # 启用 KRaft 模式
      KAFKA_KRAFT_MODE: "true"
      # Controller 配置
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # Listener 配置
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      # 节点角色
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "controller,broker"
      # 日志目录
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      # 主题配置
      OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      TRANSACTION_STATE_LOG_MIN_ISR: "1"
    ports:
      - "9092:9092"
    mem_limit: 1g
    networks:
      - realtime-net

  # ==================== Canal ====================
  canal:
    image: canal/canal-server:v1.1.6
    container_name: realtime-canal
    restart: always
    environment:
      - canal.instance.master.address=mysql:3306
      - canal.instance.dbUsername=canal
      - canal.instance.dbPassword=canal
      - canal.instance.filter.regex=.*\\..*
    ports:
      - "11111:11111"
    volumes:
      - ./docker/canal/canal.properties:/home/admin/canal-server/conf/canal.properties:ro
      - ./docker/canal/instance.properties:/home/admin/canal-server/conf/example/instance.properties:ro
    mem_limit: 512m
    networks:
      - realtime-net
    depends_on:
      - mysql
      - kafka

  # ==================== Flink JobManager ====================
  flink-jobmanager:
    image: flink:1.16
    container_name: realtime-flink-jobmanager
    restart: always
    command: jobmanager
    environment:
      - "FLINK_PROPERTIES=jobmanager.rpc.address: realtime-flink-jobmanager"
    ports:
      - "8081:8081"
    mem_limit: 1g
    networks:
      - realtime-net

  # ==================== Flink TaskManager ====================
  flink-taskmanager:
    image: flink:1.16
    container_name: realtime-flink-taskmanager
    restart: always
    command: taskmanager
    environment:
      - "FLINK_PROPERTIES=jobmanager.rpc.address: realtime-flink-jobmanager\ntaskmanager.numberOfTaskSlots: 2"
    mem_limit: 1g
    networks:
      - realtime-net
    depends_on:
      - flink-jobmanager

volumes:
  mysql_data:

networks:
  realtime-net:
    driver: bridge
